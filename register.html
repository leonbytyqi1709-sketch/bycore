<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BYCORE – Registrieren</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0D0D;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(255,107,0,0.06);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #FF6B00;
      text-shadow: 0 0 20px rgba(255,107,0,0.5);
    }

    .logo p {
      color: #555;
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #FF6B00;
      box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
    }

    input::placeholder { color: #444; }

    .btn-primary {
      width: 100%;
      background: #FF6B00;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background: #e05e00;
      box-shadow: 0 0 20px rgba(255,107,0,0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 60, 60, 0.1);
      border: 1px solid rgba(255, 60, 60, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff6b6b;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: rgba(0, 200, 100, 0.1);
      border: 1px solid rgba(0, 200, 100, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #00c864;
      margin-bottom: 16px;
      display: none;
    }

    .divider {
      text-align: center;
      color: #444;
      font-size: 12px;
      margin: 20px 0;
    }

    .link-login {
      text-align: center;
      font-size: 13px;
      color: #555;
    }

    .link-login a {
      color: #FF6B00;
      text-decoration: none;
      font-weight: 600;
    }

    .link-login a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>BYCORE</h1>
      <p>Account erstellen</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="deine@email.com" />
    </div>

    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="password" placeholder="Mindestens 6 Zeichen" />
    </div>

    <div class="form-group">
      <label>Passwort bestätigen</label>
      <input type="password" id="passwordConfirm" placeholder="••••••••" />
    </div>

    <button class="btn-primary" id="registerBtn" onclick="handleRegister()">ACCOUNT ERSTELLEN</button>

    <div class="divider">──────── oder ────────</div>

    <div class="link-login">
      Bereits ein Account? <a href="login.html">Einloggen</a>
    </div>
  </div>

  <script type="module">
    import { register } from './src/lib/auth.ts';

    window.handleRegister = async function () {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;
      const btn = document.getElementById('registerBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (password !== passwordConfirm) {
        errorMsg.textContent = 'Passwörter stimmen nicht überein.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Passwort muss mindestens 6 Zeichen lang sein.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Wird erstellt...';

      try {
        await register(email, password);
        successMsg.textContent = 'Account erstellt! Bitte bestätige deine E-Mail.';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 3000);
      } catch (err) {
        errorMsg.textContent = err.message || 'Registrierung fehlgeschlagen.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'ACCOUNT ERSTELLEN';
      }
    };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.handleRegister();
    });
  </script>
</body>
</html>
